events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    resolver NGINX_RESOLVER valid=30s ipv6=off;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        location /api/ {
            limit_req zone=api burst=10 nodelay;
            set $motor_api "motor-api.railway.internal:8000";
            proxy_pass http://$motor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        location /auth/ {
            limit_req zone=auth burst=3 nodelay;
            set $motor_api "motor-api.railway.internal:8000";
            proxy_pass http://$motor_api;
            proxy_set_header Host $host;
        }

        location /admin/ {
            limit_req zone=auth burst=5 nodelay;
            set $motor_api "motor-api.railway.internal:8000";
            proxy_pass http://$motor_api;
            proxy_set_header Host $host;
        }

        location /painel/ {
            set $admin_panel "admin-panel.railway.internal:80";
            proxy_pass http://$admin_panel/;
            proxy_set_header Host $host;
        }

        location / {
            set $user_panel "user-panel.railway.internal:80";
            proxy_pass http://$user_panel;
            proxy_set_header Host $host;
        }
    }
}

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API pública — interface da professora chama aqui
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://motor-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # Autenticação JWT
        location /auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://motor-api:8000;
            proxy_set_header Host $host;
        }

        # Endpoints admin protegidos
        location /admin/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://motor-api:8000;
            proxy_set_header Host $host;
        }

        # Painel admin React — acesso com /painel/
        location /painel/ {
            proxy_pass http://admin-panel:80/;
            proxy_set_header Host $host;
        }

        # User panel React — raiz do site
        location / {
            proxy_pass http://user-panel:80;
            proxy_set_header Host $host;
        }
    }
}

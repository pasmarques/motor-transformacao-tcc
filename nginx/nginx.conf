events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Resolver DNS interno do Docker/Railway (necessário para proxy_pass com variáveis)
    resolver 127.0.0.11 valid=30s ipv6=off;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        # API pública — interface da professora chama aqui
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            set $motor_api "motor-api.railway.internal:8000";
            proxy_pass http://$motor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # Autenticação JWT
        location /auth/ {
            limit_req zone=auth burst=3 nodelay;
            set $motor_api "motor-api.railway.internal:8000";
            proxy_pass http://$motor_api;
            proxy_set_header Host $host;
        }

        # Endpoints admin protegidos
        location /admin/ {
            limit_req zone=auth burst=5 nodelay;
            set $motor_api "motor-api.railway.internal:8000";
            proxy_pass http://$motor_api;
            proxy_set_header Host $host;
        }

        # Painel admin React — acesso com /painel/
        location /painel/ {
            set $admin_panel "admin-panel.railway.internal:80";
            proxy_pass http://$admin_panel/;
            proxy_set_header Host $host;
        }

        # User panel React — raiz do site
        location / {
            set $user_panel "user-panel.railway.internal:80";
            proxy_pass http://$user_panel;
            proxy_set_header Host $host;
        }
    }
}

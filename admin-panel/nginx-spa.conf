server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Assets do build Vite (JS, CSS, imagens)
    location /painel/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA — qualquer rota vai para index.html
    location / {
        try_files $uri /index.html;
    }
}
